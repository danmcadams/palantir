<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Inner glow: bright blue-white core fading to deep dark -->
    <radialGradient id="orb" cx="50%" cy="48%" r="50%">
      <stop offset="0%"   stop-color="#ddeeff"/>
      <stop offset="22%"  stop-color="#5588cc"/>
      <stop offset="60%"  stop-color="#111830"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <!-- Specular highlight: top-left sphere sheen -->
    <radialGradient id="shine" cx="38%" cy="30%" r="38%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- The orb -->
  <circle cx="16" cy="16" r="15" fill="url(#orb)"/>
  <!-- Specular highlight to sell the sphere -->
  <circle cx="16" cy="16" r="15" fill="url(#shine)"/>
  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#4466aa" stroke-width="0.75" stroke-opacity="0.6"/>
</svg>
