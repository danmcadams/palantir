<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- subtle top shine -->
  <rect width="32" height="16" rx="7" fill="url(#shine)"/>

  <!-- D letterform as path for crisp rendering at all sizes -->
  <path d="M8 7 L14 7 C21.5 7 21.5 25 14 25 L8 25 Z
           M11.5 10.5 L13.5 10.5 C18 10.5 18 21.5 13.5 21.5 L11.5 21.5 Z"
        fill="white" fill-rule="evenodd"/>
</svg>
